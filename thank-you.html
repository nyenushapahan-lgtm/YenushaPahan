<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f8fafc;
            text-align: center;
        }
        .thank-you-box {
            padding: 3rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .thank-you-box h1 {
            color: #2563eb;
            font-size: 3rem;
        }
        .thank-you-box p {
            color: #334155;
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 1rem;
        }
    </style>
    <meta http-equiv="refresh" content="5;url=index.html">
</head>
<body>
    <div class="thank-you-box">
        <h1>✅ Thank You!</h1>
        <p>Your message has been sent successfully.</p>
        <p>I'll get back to you within 24 hours.</p>
        <a href="index.html" class="btn">← Back to Home</a>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: #94a3b8;">Redirecting in 5 seconds...</p>
    </div>
</body>
</html>
